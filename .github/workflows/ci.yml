name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentrooms
          POSTGRES_PASSWORD: agentrooms
          POSTGRES_DB: agentrooms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentrooms"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      AGENTROOMS_DATABASE_URL: postgresql+asyncpg://agentrooms:agentrooms@localhost:5432/agentrooms

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install backend + plugin
        working-directory: backend
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install -e ../plugin/mcp

      - name: Run migrations
        working-directory: backend
        run: .venv/bin/alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: .venv/bin/python -m pytest -q

      - name: Run conformance vectors
        working-directory: backend
        run: .venv/bin/python ../conformance/run.py
