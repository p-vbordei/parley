services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: parley
      POSTGRES_PASSWORD: parley
      POSTGRES_DB: parley
    ports:
      - "5435:5432"
    volumes:
      - parley_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parley -d parley"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  parley_pg:
